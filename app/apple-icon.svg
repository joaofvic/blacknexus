<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <defs>
    <linearGradient id="bn-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1622"/>
      <stop offset="100%" stop-color="#07050a"/>
    </linearGradient>
    <linearGradient id="bn-hex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3343"/>
      <stop offset="100%" stop-color="#c70612"/>
    </linearGradient>
    <filter id="bn-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="180" height="180" fill="url(#bn-bg)"/>
  <polygon
    points="90,40 144,70 144,130 90,160 36,130 36,70"
    fill="#ff2230"
    opacity="0.5"
    filter="url(#bn-glow)"
  />
  <polygon
    points="90,40 144,70 144,130 90,160 36,130 36,70"
    fill="url(#bn-hex)"
    stroke="#ffffff"
    stroke-opacity="0.22"
    stroke-width="1.5"
    stroke-linejoin="round"
  />
  <polygon
    points="90,68 122,86 122,114 90,132 58,114 58,86"
    fill="none"
    stroke="#ffffff"
    stroke-opacity="0.55"
    stroke-width="2.6"
    stroke-linejoin="round"
  />
</svg>
